name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/erykkruk/appboard-web:latest
            ghcr.io/erykkruk/appboard-web:${{ steps.pkg.outputs.version }}
            ghcr.io/erykkruk/appboard-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # After the multi-arch :latest is published, tell Coolify (prod) to pull it.
      # Set the COOLIFY_DEPLOY_WEBHOOK secret to the panel app's Deploy Webhook URL.
      # Skipped cleanly until the secret exists, so this never fails the build.
      - name: Trigger Coolify redeploy
        env:
          HOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK not set — skipping prod redeploy."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Coolify redeploy triggered."
