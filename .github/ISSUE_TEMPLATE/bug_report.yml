name: Bug Report
description: Report a bug to help us improve AppBoard
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.

        > Do **not** report security vulnerabilities here — see our
        > [Security Policy](../blob/main/SECURITY.md) instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about your environment.
      value: |
        - AppBoard version / commit (self-hosted):
        - OS:
        - Browser (if applicable):
        - Runtime (Bun version, PostgreSQL version, etc.):
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any relevant log output or screenshots. This is automatically formatted into code, no backticks needed.
      render: shell
    validations:
      required: false
